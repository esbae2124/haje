<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- OpenGraph 메타 데이터 설정 -->
    <meta property="og:title" content="하제 — 내일을 향해 나아가는 이야기">
    <meta property="og:description" content="독립 예술 극단 '하제'의 공식 웹사이트.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&w=1200&h=630&q=80">
    <meta property="og:url" content="https://haje.com">

    <title>극단 하제 (haje) — 내일을 향해 나아가는 이야기</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sky: #7bc4d8; --sky2: #a8d8e8; --sky3: #c8e8f2; --sky4: #e0f2f8;
            --surface: #fff; --border: #d0ecf4; --border2: #b8e0ec;
            --text: #1a3a45; --text2: #3a6a7a; --text3: #6a9aaa;
            --accent: #2a8aaa; --accent2: #1a6a88;
        }
        body { 
            background: var(--sky); 
            font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 블루 파도 배경 그래픽 */
        .wave-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; pointer-events: none; 
        }
        .wave-bg svg { width: 100%; height: 100%; object-fit: cover; }

        .site-wrap { 
            max-width: 720px; margin: 0 auto; 
            position: relative; z-index: 1; 
            padding-bottom: 4rem; 
        }

        /* 네비게이션 헤더 */
        nav { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(255,255,255,0.75); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(168,216,232,0.5); 
        }
        .nav-inner { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 1.5rem; height: 56px; 
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: var(--accent2); letter-spacing: 0.05em; }
        .nav-logo span { font-size: 11px; font-weight: 400; color: var(--text3); margin-left: 0.4rem; }
        .nav-links { display: flex; list-style: none; }
        .nav-links a { 
            padding: 0 0.8rem; font-size: 13px; color: var(--text2); 
            text-decoration: none; cursor: pointer; font-weight: 500;
            transition: color .2s;
        }
        .nav-links a:hover { color: var(--accent); }

        .section-wrap { padding: 1.25rem 1.25rem 0; }
        .card { 
            background: var(--surface); border-radius: 16px; 
            padding: 2rem; margin-bottom: 1.5rem; 
            border: 1px solid rgba(168,216,232,0.6); 
            box-shadow: 0 4px 24px rgba(42,138,170,0.08); 
            position: relative;
        }
        .section-label { 
            font-size: 11px; color: var(--text3); font-weight: 700; 
            margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; 
            letter-spacing: 0.15em; text-transform: uppercase;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

        .hero-title { font-size: 26px; font-weight: 300; margin-bottom: 1rem; color: var(--text); }
        .hero-title strong { font-weight: 700; color: var(--accent); }

        /* [핵심 수정] 캘린더 스크롤 및 너비 고정 */
        .cal-outer-wrap {
            width: 100%;
            overflow-x: auto; /* 가로 스크롤 허용 */
            -webkit-overflow-scrolling: touch;
            padding-bottom: 15px; /* 스크롤바 공간 */
            margin-top: 10px;
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .cal-month-label { font-size: 16px; font-weight: 700; color: var(--text); }
        .cal-nav { display: flex; gap: 6px; }
        .cal-nav button { 
            background: var(--sky4); border: 1px solid var(--border2); 
            color: var(--text2); padding: 4px 12px; font-size: 13px; 
            cursor: pointer; border-radius: 20px; transition: all .2s; 
        }

        .cal-grid { 
            display: grid; 
            /* [수정] 7일 동일 너비로 고정 (각 110px씩 총 약 800px 내외) */
            grid-template-columns: repeat(7, 110px); 
            gap: 6px; 
            min-width: 810px; /* 전체 최소 너비 확보 */
        }
        .cal-dow { font-size: 11px; color: var(--text3); text-align: center; padding: 6px 0; font-weight: 700; }
        .cal-day { 
            background: var(--sky4); border-radius: 8px; min-height: 80px; 
            padding: 8px 6px; font-size: 12px; color: var(--text3); 
            border: 1px solid transparent; transition: background 0.15s; 
            display: flex; flex-direction: column; gap: 4px;
        }
        .cal-day.today { background: #e8f7fb; border-color: var(--accent); }
        .cal-day.today .day-num { color: var(--accent2); font-weight: 700; }
        .cal-day.other-month { opacity: 0.35; }
        .cal-day.has-event { background: #fff; border: 1px solid var(--accent); cursor: pointer; }
        .cal-day.has-event:hover { background: var(--sky3); }
        .day-num { font-size: 11px; display: block; margin-bottom: 2px; }

        /* [핵심 수정] 일정 제목 8-9글자 대응 및 말줄임 */
        .event-dot { 
            font-size: 10px; color: var(--accent);
            line-height: 1.3;
            background: rgba(42, 138, 170, 0.08); 
            padding: 3px 5px; 
            border-radius: 4px; 
            border-left: 2px solid var(--accent);
            /* 한글 8~9자 정도를 위한 텍스트 처리 */
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 최대 2줄 표시 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
            white-space: normal;
        }

        /* 일정 목록 리스트 */
        .sched-list { display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; }
        .sched-item { 
            background: #fff; border: 1px solid var(--border); padding: 1rem; 
            border-radius: 12px; cursor: pointer; display: grid; 
            grid-template-columns: 55px 1fr auto; align-items: center; gap: 1rem;
            position: relative; transition: all 0.2s;
        }
        .sched-item:hover { border-color: var(--accent); box-shadow: 0 4px 15px rgba(42,138,170,0.1); }
        .si-date { text-align: center; line-height: 1.3; }
        .si-date strong { display: block; font-size: 20px; font-weight: 300; color: var(--accent2); }
        .si-date span { font-size: 11px; color: var(--text3); }
        .si-info h4 { font-size: 14px; margin-bottom: 2px; font-weight: 500; }
        .si-info p { font-size: 12px; color: var(--text3); }

        /* 관리자 기능 스타일 */
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        .add-btn { width: 100%; background: var(--sky4); border: 1px dashed var(--border2); color: var(--text3); padding: 12px; font-size: 13px; cursor: pointer; border-radius: 10px; margin-top: 1rem; }
        .form-box { display: none; background: var(--sky4); border: 1px solid var(--border2); padding: 1.25rem; border-radius: 12px; margin-top: 1rem; }
        .form-box.show { display: block; }
        .form-row { margin-bottom: 0.75rem; }
        .form-row label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 700; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; background: #fff; border: 1px solid var(--border2); padding: 8px 12px; font-size: 13px; border-radius: 8px; outline: none; }
        .form-submit { flex: 1; background: var(--accent); border: none; color: #fff; padding: 10px; font-size: 13px; border-radius: 8px; cursor: pointer; font-weight: 500; text-align: center; }

        .popup-overlay { position: fixed; inset: 0; background: rgba(20,60,80,0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1.5rem; }
        .popup-box { background: #fff; padding: 2.2rem; border-radius: 20px; max-width: 440px; width: 100%; position: relative; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(42,138,170,0.15); }
        .popup-close { position: absolute; top: 1rem; right: 1rem; cursor: pointer; background: var(--sky4); border: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .popup-desc { background: var(--sky4); padding: 1.25rem; border-radius: 12px; font-size: 13.5px; line-height: 1.7; color: var(--text2); margin: 15px 0; white-space: pre-wrap; }

        .admin-trigger { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 90; background: #fff; border: 1px solid var(--border2); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 18px; }
        .toast-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(26, 58, 69, 0.95); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; z-index: 300; display: none; }
        .toast-box.show { display: block; animation: fadeInUp 0.3s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .confirm-modal { position: fixed; inset: 0; background: rgba(20,60,80,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 250; padding: 1rem; }
        .confirm-content { background: #fff; padding: 1.8rem; border-radius: 18px; max-width: 320px; width: 100%; text-align: center; }
        .confirm-buttons { display: flex; gap: 8px; margin-top: 20px; }
        .confirm-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }

        footer { margin: 0 1.25rem; background: rgba(255,255,255,0.6); border-radius: 16px; border: 1px solid rgba(168,216,232,0.5); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .f-logo { font-size: 15px; font-weight: 700; color: var(--accent2); }

        @media(max-width:560px){
            .about-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 22px; }
            .sched-item { grid-template-columns: 50px 1fr; }
        }
    </style>
</head>
<body>

    <div class="wave-bg">
        <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#7bc4d8"/>
            <g opacity="0.55" fill="none" stroke="#fff" stroke-width="2">
                <path d="M-100,120 C100,80 200,160 400,100 C600,40 700,140 900,90 C1100,40 1150,110 1300,80"/>
                <path d="M-100,190 C100,150 200,230 400,170 C600,110 700,210 900,160 C1100,110 1150,180 1300,150"/>
            </g>
        </svg>
    </div>

    <nav>
        <div class="nav-inner">
            <div class="nav-logo">하제 <span>내일의 극단</span><span id="sync-status" style="font-size: 10px; color: var(--text3); margin-left: 0.6rem; font-weight: 400; display: inline-flex; align-items: center; gap: 4px;"><i class="fa-solid fa-circle-notch fa-spin" style="color: var(--accent); font-size: 8px;"></i> 데이터 연동 중</span></div>
            <ul class="nav-links">
                <li><a onclick="scrollToSection('about')">About</a></li>
                <li><a onclick="scrollToSection('schedule')">Schedule</a></li>
                <li><a onclick="scrollToSection('board')">Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="site-wrap">
        <div class="section-wrap">
            <section id="about" class="card">
                <div class="section-label">About</div>
                <h1 class="hero-title"><strong>하제</strong> — 내일을 향해<br>나아가는 이야기</h1>
                <p>과거의 장벽을 부수고 내일을 만드는 독립 예술가들의 공간입니다.</p>
            </section>

            <section id="schedule" class="card">
                <div class="section-label">Schedule</div>
                <div class="cal-header">
                    <div id="cal-month-label" style="font-weight:700">2026년 6월</div>
                    <div style="display:flex; gap:5px;"><button onclick="changeMonth(-1)">‹</button><button onclick="changeMonth(1)">›</button></div>
                </div>
                
                <!-- [수정] 캘린더 가로 스크롤을 위한 래퍼 추가 -->
                <div class="cal-outer-wrap">
                    <div class="cal-grid" id="cal-grid"></div>
                </div>
                
                <div class="admin-only">
                    <button class="add-btn" onclick="toggleForm('event-form')">＋ 스케줄 추가하기</button>
                    <div class="form-box" id="event-form">
                        <div class="form-row"><label>날짜</label><input type="date" id="evt-date"></div>
                        <div class="form-row"><label>제목</label><input type="text" id="evt-title"></div>
                        <div class="form-row"><label>분류</label><select id="evt-type"><option value="perf">공연</option><option value="event">행사</option></select></div>
                        <div class="form-row"><label>장소</label><input type="text" id="evt-venue"></div>
                        <div class="form-row"><label>설명</label><textarea id="evt-desc"></textarea></div>
                        <button class="form-submit" onclick="submitEvent()">등록하기</button>
                    </div>
                </div>
                <div class="sched-list" id="sched-list"></div>
            </section>

            <section id="board" class="card">
                <div class="section-label">Board</div>
                <div class="admin-only"><button class="add-btn" onclick="toggleForm('post-form')">＋ 공지글 작성</button>
                    <div class="form-box" id="post-form">
                        <div class="form-row"><label>태그</label><input type="text" id="post-cat" placeholder="공지, 소식 등"></div>
                        <div class="form-row"><label>제목</label><input type="text" id="post-title"></div>
                        <div class="form-row"><label>내용</label><textarea id="post-desc"></textarea></div>
                        <button class="form-submit" onclick="submitPost()">등록하기</button>
                    </div>
                </div>
                <div id="board-list"></div>
            </section>
        </div>

        <footer>
            <div class="f-logo">하제 <span>극단 · HAJE</span></div>
            <div class="f-copy">Seoul, Korea · © 2026</div>
        </footer>
    </div>

    <!-- 🔒 관리자 및 팝업 모달들 -->
    <div class="admin-trigger" id="admin-trigger" onclick="handleAdminTrigger()">🔒</div>
    <div class="popup-overlay" id="popup" onclick="if(event.target==this) closePopup()">
        <div class="popup-box" id="p-content-box"></div>
    </div>
    <div id="toast-box" class="toast-box"></div>
    <div id="confirm-modal" class="confirm-modal">
        <div class="confirm-content"><p id="confirm-msg"></p><div class="confirm-buttons"><button id="confirm-yes" class="confirm-btn" style="background:#ff6b6b;color:#fff">확인</button><button id="confirm-no" class="confirm-btn" style="background:#eee">취소</button></div></div>
    </div>

    <script>
        const SHEET_BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYWLCB8EZfx6d1_vL-FV-vUD5dteaavxv4OvUiTYWypIMWRK0izL2PhZfHeZDMm6qpmvvS1cC7Trcz/pub";
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzGZA1PuVNGWR0XRN_KzkQIocK56PDKzc5gVfeOYnd2p_2yihVWpPid7smvcvWmZ8jWLw/exec";
        
        let events = [], posts = [], isAdmin = false, currentPopupItem = null;
        let cy = 2026, cm = 5;
        const DOW = ['일','월','화','수','목','금','토'];

        function triggerToast(msg) { const t=document.getElementById('toast-box'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
        
        let confirmAction = null;
        function triggerConfirm(msg, action) { document.getElementById('confirm-msg').textContent=msg; document.getElementById('confirm-modal').style.display='flex'; confirmAction=action; }
        document.getElementById('confirm-yes').onclick=()=>{ document.getElementById('confirm-modal').style.display='none'; if(confirmAction) confirmAction(); };
        document.getElementById('confirm-no').onclick=()=>{ document.getElementById('confirm-modal').style.display='none'; };

        async function loadData() {
            const statusEl = document.getElementById('sync-status');
            if (statusEl) {
                statusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin" style="color: var(--accent); font-size: 8px;"></i> 데이터 연동 중`;
            }
            try {
                const res = await new Promise((resolve, reject) => { Papa.parse(SHEET_BASE_URL+"?gid=0&output=csv", { download:true, header:true, complete:resolve, error:reject }); });
                events = res.data.filter(r => r.date && r.title);
                if (statusEl) {
                    statusEl.innerHTML = `<i class="fa-solid fa-circle" style="color: #2ecc71; font-size: 8px;"></i> 데이터 연동 완료`;
                }
            } catch (e) { 
                triggerToast("데이터 연동 지연"); 
                if (statusEl) {
                    statusEl.innerHTML = `<i class="fa-solid fa-circle" style="color: #e74c3c; font-size: 8px;"></i> 오프라인 모드`;
                }
            }
            render();
        }

        function render() {
            const grid = document.getElementById('cal-grid');
            const list = document.getElementById('sched-list');
            document.getElementById('cal-month-label').textContent = `${cy}년 ${cm+1}월`;
            grid.innerHTML = ''; list.innerHTML = '';

            DOW.forEach(d => { grid.innerHTML += `<div class="cal-dow">${d}</div>`; });
            const first = new Date(cy, cm, 1).getDay();
            const last = new Date(cy, cm+1, 0).getDate();
            const prevLast = new Date(cy, cm, 0).getDate();

            for(let i=0; i<first; i++) { grid.innerHTML += `<div class="cal-day other-month"><span class="day-num">${prevLast-first+1+i}</span></div>`; }
            for(let d=1; d<=last; d++) {
                const key = `${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvs = events.filter(e => e.date === key);
                let html = `<div class="cal-day ${dayEvs.length?'has-event':''}" onclick="${dayEvs.length?`openDetail(${JSON.stringify(dayEvs[0]).replace(/"/g,'&quot;')})`:''}">
                                <span class="day-num">${d}</span>`;
                dayEvs.forEach(e => { html += `<span class="event-dot">${e.title}</span>`; });
                html += `</div>`;
                grid.innerHTML += html;
            }
            renderScheduleList();
        }

        function renderScheduleList() {
            const list = document.getElementById('sched-list');
            const filtered = events.filter(e => e.date.startsWith(`${cy}-${String(cm+1).padStart(2,'0')}`)).sort((a,b)=>a.date.localeCompare(b.date));
            list.innerHTML = filtered.map(e => `
                <div class="sched-item" onclick='openDetail(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
                    <div class="si-date"><strong>${e.date.split('-')[2]}</strong><span>${cm+1}월</span></div>
                    <div class="si-info"><h4>${e.title}</h4><p>${e.venue || ''}</p></div>
                    <div class="si-tag">${e.type==='perf'?'공연':'행사'}</div>
                </div>`).join('');
        }

        function openDetail(item) {
            currentPopupItem = JSON.parse(JSON.stringify(item));
            renderPopupViewMode();
            document.getElementById('popup').style.display='flex';
        }

        function renderPopupViewMode() {
            const isEvent = !!currentPopupItem.venue;
            document.getElementById('p-content-box').innerHTML = `
                <button class="popup-close" onclick="closePopup()">✕</button>
                <div class="popup-tag">${isEvent?'Schedule':'Board'}</div>
                <div class="popup-title">${currentPopupItem.title}</div>
                <div class="popup-date">${currentPopupItem.date}</div>
                <div class="popup-desc">${currentPopupItem.desc || ''}</div>
                <div class="admin-only" style="display:${isAdmin?'flex':'none'}; gap:8px; margin-top:20px;">
                    <button class="form-submit" onclick="switchPopupEditMode()">수정하기</button>
                    <button class="form-submit" onclick="deleteItemDirectly()" style="background:#ff6b6b">삭제하기</button>
                </div>`;
        }

        function switchPopupEditMode() {
            const isEv = !!currentPopupItem.venue;
            document.getElementById('p-content-box').innerHTML = `
                <button class="popup-close" onclick="closePopup()">✕</button>
                <div class="form-box show" style="background:none; border:none; padding:0;">
                    <div class="form-row"><label>제목</label><input type="text" id="edit-title" value="${currentPopupItem.title}"></div>
                    <div class="form-row"><label>날짜</label><input type="text" id="edit-date" value="${currentPopupItem.date}"></div>
                    ${isEv?`<div class="form-row"><label>장소</label><input type="text" id="edit-venue" value="${currentPopupItem.venue}"></div>`:''}
                    <div class="form-row"><label>설명</label><textarea id="edit-desc" style="height:100px">${currentPopupItem.desc || ''}</textarea></div>
                    <div class="form-actions"><button class="form-submit" onclick="submitEditDirectly()">저장</button><button class="form-submit" onclick="renderPopupViewMode()" style="background:#eee;color:#333">취소</button></div>
                </div>`;
        }

        async function submitEditDirectly() {
            const newData = { title: document.getElementById('edit-title').value, date: document.getElementById('edit-date').value, desc: document.getElementById('edit-desc').value };
            if(currentPopupItem.venue) newData.venue = document.getElementById('edit-venue').value;
            closePopup(); triggerToast("수정 사항을 전송 중입니다...");
            const action = currentPopupItem.venue ? 'editEvent' : 'editPost';
            if(await sendToGas(action, { old: currentPopupItem, new: newData })) { triggerToast("수정 완료"); loadData(); }
        }

        async function deleteItemDirectly() {
            triggerConfirm("정말로 삭제하시겠습니까?", async () => {
                closePopup(); triggerToast("삭제 중...");
                const action = currentPopupItem.venue ? 'deleteEvent' : 'deletePost';
                if(await sendToGas(action, currentPopupItem)) { triggerToast("삭제 완료"); loadData(); }
            });
        }

        async function sendToGas(action, payload) {
            try { await fetch(GAS_WEBAPP_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({action, payload}) }); return true; } 
            catch(e) { triggerToast("전송 오류"); return false; }
        }

        function handleAdminTrigger() {
            if(isAdmin) { isAdmin=false; document.body.classList.remove('admin-mode'); document.getElementById('admin-trigger').textContent="🔒"; }
            else { const pw=prompt("비밀번호?"); if(pw==="haje123"){ isAdmin=true; document.body.classList.add('admin-mode'); document.getElementById('admin-trigger').textContent="🔓"; triggerToast("관리자 로그인"); } }
            render();
        }

        function closePopup() { document.getElementById('popup').style.display='none'; }
        function toggleForm(id) { document.getElementById(id).classList.toggle('show'); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function changeMonth(n) { cm+=n; if(cm>11){cm=0;cy++} if(cm<0){cm=11;cy--} render(); }

        window.onload = loadData;
    </script>
</body>
</html>

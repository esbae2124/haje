<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>극단 하제 (haje) — 내일을 향해 나아가는 이야기</title>
    <meta property="og:title" content="하제 — 내일을 향해 나아가는 이야기">
    <meta property="og:description" content="독립 예술 극단 '하제'의 공식 웹사이트.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&w=1200&h=630&q=80">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        /* [기존 디자인 스타일 유지] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sky: #7bc4d8; --sky2: #a8d8e8; --sky3: #c8e8f2; --sky4: #e0f2f8;
            --surface: #fff; --border: #d0ecf4; --border2: #b8e0ec;
            --text: #1a3a45; --text2: #3a6a7a; --text3: #6a9aaa;
            --accent: #2a8aaa; --accent2: #1a6a88;
        }
        body { background: var(--sky); font-family: 'Noto Sans KR', sans-serif; color: var(--text); line-height: 1.6; }
        .wave-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .site-wrap { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; padding-bottom: 4rem; }
        nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(168,216,232,0.5); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem; height: 56px; }
        .nav-logo { font-size: 18px; font-weight: 700; color: var(--accent2); }
        .nav-links { display: flex; list-style: none; }
        .nav-links a { padding: 0 0.8rem; font-size: 13px; color: var(--text2); text-decoration: none; cursor: pointer; }
        .section-wrap { padding: 1.25rem 1.25rem 0; }
        .card { background: var(--surface); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; border: 1px solid rgba(168,216,232,0.6); box-shadow: 0 4px 24px rgba(42,138,170,0.08); position: relative; }
        .section-label { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; letter-spacing: 0.15em; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
        .hero-title { font-size: 26px; font-weight: 300; margin-bottom: 1rem; color: var(--text); }
        .hero-title strong { font-weight: 700; color: var(--accent); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { background: var(--sky4); border-radius: 8px; min-height: 65px; padding: 6px; font-size: 12px; border: 1px solid transparent; }
        .cal-day.has-event { background: #fff; border: 1px solid var(--accent); cursor: pointer; }
        .event-dot { font-size: 9px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; border-left: 2px solid var(--accent); padding-left: 2px; margin-top: 2px; }
        .sched-item, .board-item { background: #fff; border: 1px solid var(--border); padding: 1rem; border-radius: 12px; cursor: pointer; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* [관리자 폼 스타일] */
        .admin-only { display: none; margin-top: 15px; }
        body.admin-mode .admin-only { display: block; }
        .form-box { background: var(--sky4); padding: 1.25rem; border-radius: 12px; margin-top: 10px; display: none; }
        .form-box.show { display: block; }
        .form-row { margin-bottom: 10px; }
        .form-row label { font-size: 11px; display: block; margin-bottom: 3px; font-weight: 700; }
        .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px; border: 1px solid var(--border2); border-radius: 8px; font-family: inherit; font-size: 13px; }
        .form-submit { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        
        /* [팝업 상세 및 수정 모드] */
        .popup-overlay { position: fixed; inset: 0; background: rgba(20,60,80,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1.5rem; }
        .popup-box { background: #fff; padding: 2.2rem; border-radius: 20px; max-width: 440px; width: 100%; position: relative; }
        .popup-close { position: absolute; top: 1rem; right: 1rem; cursor: pointer; background: var(--sky4); border: none; width: 30px; height: 30px; border-radius: 50%; }
        .popup-desc { background: var(--sky4); padding: 1rem; border-radius: 10px; margin: 15px 0; font-size: 14px; white-space: pre-wrap; }
        
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 150; }
    </style>
</head>
<body>

    <div class="wave-bg">
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#7bc4d8"/><path d="M0,100 C300,50 600,150 900,100" stroke="#fff" fill="none" opacity="0.3"/></svg>
    </div>

    <nav>
        <div class="nav-inner">
            <div class="nav-logo">하제 <span>내일의 극단</span></div>
            <ul class="nav-links">
                <li><a onclick="scrollToSection('about')">About</a></li>
                <li><a onclick="scrollToSection('schedule')">Schedule</a></li>
                <li><a onclick="scrollToSection('board')">Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="site-wrap">
        <div class="section-wrap">
            <section id="about" class="card">
                <div class="section-label">About</div>
                <h1 class="hero-title"><strong>하제</strong> — 내일을 향해<br>나아가는 이야기</h1>
                <p>과거의 장벽을 부수고 내일을 만드는 독립 예술가들의 공간입니다.</p>
            </section>

            <section id="schedule" class="card">
                <div class="section-label">Schedule</div>
                <div class="cal-header">
                    <div id="cal-month-label" style="font-weight:700">2026년 6월</div>
                    <div style="display:flex; gap:5px;"><button onclick="changeMonth(-1)">‹</button><button onclick="changeMonth(1)">›</button></div>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
                <div class="admin-only"><button class="add-btn" onclick="toggleForm('event-form')">＋ 스케줄 추가</button>
                    <div class="form-box" id="event-form">
                        <div class="form-row"><label>날짜</label><input type="date" id="f-date"></div>
                        <div class="form-row"><label>제목</label><input type="text" id="f-title"></div>
                        <div class="form-row"><label>장소</label><input type="text" id="f-venue"></div>
                        <div class="form-row"><label>상세</label><textarea id="f-desc"></textarea></div>
                        <button class="form-submit" onclick="addEvent()">등록하기</button>
                    </div>
                </div>
                <div id="sched-list"></div>
            </section>

            <section id="board" class="card">
                <div class="section-label">Board</div>
                <div id="board-list"></div>
                <div class="admin-only"><button class="add-btn" onclick="toggleForm('post-form')">＋ 공지 추가</button></div>
            </section>
        </div>
    </div>

    <!-- 🔒 관리자 트리거 -->
    <div class="admin-trigger" onclick="handleAdminTrigger()">🔒</div>

    <!-- 팝업 오버레이 (상세보기 및 수정) -->
    <div class="popup-overlay" id="popup" onclick="if(event.target==this) closePopup()">
        <div class="popup-box" id="p-content">
            <!-- JS에서 내용 채움 -->
        </div>
    </div>

    <script>
        // 🔗 1. 구글 시트 CSV 주소 (이전 주소 그대로 사용)
        const SHEET_BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYWLCB8EZfx6d1_vL-FV-vUD5dteaavxv4OvUiTYWypIMWRK0izL2PhZfHeZDMm6qpmvvS1cC7Trcz/pub";
        
        // 🚀 2. 구글 앱스 스크립트 웹 앱 주소 (방금 복사한 exec 주소!)
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw2uTQTQjb-PFJzRjP_vQ39bG7iS6qwh6ToSR95qnOZaHvX2wttTeFgdmUhI9bsay1KVQ/exec";

        let events = [], posts = [], isAdmin = false, currentItem = null;
        let cy = 2026, cm = 5;

        async function loadData() {
            Papa.parse(SHEET_BASE_URL + "?gid=0&output=csv", {
                download: true, header: true, complete: function(res) {
                    events = res.data.filter(r => r.date); render();
                }
            });
            // 게시판 데이터 로드 생략 (gid 설정 필요)
        }

        function render() {
            const grid = document.getElementById('cal-grid');
            const list = document.getElementById('sched-list');
            grid.innerHTML = ''; list.innerHTML = '';
            document.getElementById('cal-month-label').textContent = `${cy}년 ${cm+1}월`;
            
            const days = new Date(cy, cm + 1, 0).getDate();
            for(let d=1; d<=days; d++) {
                const key = `${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvs = events.filter(e => e.date === key);
                const el = document.createElement('div');
                el.className = 'cal-day' + (dayEvs.length ? ' has-event' : '');
                el.innerHTML = `<span>${d}</span>` + dayEvs.map(e => `<span class="event-dot">${e.title}</span>`).join('');
                if(dayEvs.length) el.onclick = () => openDetail(dayEvs[0]);
                grid.appendChild(el);
            }
            // 리스트 렌더링...
        }

        function openDetail(item) {
            currentItem = JSON.parse(JSON.stringify(item));
            renderViewMode();
            document.getElementById('popup').style.display = 'flex';
        }

        function renderViewMode() {
            document.getElementById('p-content').innerHTML = `
                <button class="popup-close" onclick="closePopup()">✕</button>
                <div class="popup-tag">${currentItem.venue ? 'Schedule' : 'Board'}</div>
                <h2>${currentItem.title}</h2>
                <p>${currentItem.date} | ${currentItem.venue || currentItem.cat}</p>
                <div class="popup-desc">${currentItem.desc}</div>
                <div class="admin-only" style="display:${isAdmin?'flex':'none'}; gap:10px;">
                    <button class="form-submit" onclick="switchEditMode()">수정하기</button>
                    <button class="form-submit" style="background:#ff6b6b" onclick="deleteItem()">삭제</button>
                </div>
            `;
        }

        function switchEditMode() {
            document.getElementById('p-content').innerHTML = `
                <button class="popup-close" onclick="closePopup()">✕</button>
                <div class="form-box show" style="background:none; padding:0;">
                    <div class="form-row"><label>제목</label><input type="text" id="edit-title" value="${currentItem.title}"></div>
                    <div class="form-row"><label>날짜</label><input type="text" id="edit-date" value="${currentItem.date}"></div>
                    <div class="form-row"><label>설명</label><textarea id="edit-desc">${currentItem.desc}</textarea></div>
                    <button class="form-submit" onclick="saveEdit()">저장하기</button>
                </div>
            `;
        }

        async function saveEdit() {
            const newData = {
                title: document.getElementById('edit-title').value,
                date: document.getElementById('edit-date').value,
                desc: document.getElementById('edit-desc').value,
                venue: currentItem.venue, type: currentItem.type, time: currentItem.time
            };
            const success = await sendToGas('editEvent', { old: currentItem, new: newData });
            if(success) { alert("수정 완료!"); closePopup(); loadData(); }
        }

        async function sendToGas(action, payload) {
            await fetch(GAS_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, payload }) });
            return true;
        }

        function handleAdminTrigger() {
            const pw = prompt("비밀번호?");
            if(pw === "haje123") { isAdmin = true; document.body.classList.add('admin-mode'); render(); }
        }

        function closePopup() { document.getElementById('popup').style.display = 'none'; }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        window.onload = loadData;
    </script>
</body>
</html>
